services:
  api:
    build: .
    container_name: algonova_api
    restart: unless-stopped
    ports:
      - "8086:8080"
    volumes:
      # SANGAT PENTING: Mount folder mediafiles ke host (VPS)
      # Agar PDF tidak hilang jika kontainer di-restart/dihapus
      - ./mediafiles:/app/mediafiles
    env_file:
      - .env
    environment:
      - TZ=Asia/Jakarta
      - DB_HOST=gothub_db 
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GIN_MODE=release
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  default:
    external: true
    name: shared-network