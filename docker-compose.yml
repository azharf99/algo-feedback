services:
  api:
    image: azharfa/algo-feedback:latest
    container_name: algonova_api
    restart: unless-stopped
    ports:
      - "8086:8080"
    volumes:
      # SANGAT PENTING: Mount folder mediafiles ke host (VPS)
      # Agar PDF tidak hilang jika kontainer di-restart/dihapus
      - ./mediafiles:/app/mediafiles
    env_file:
      - .env
    environment:
      - TZ=Asia/Jakarta
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GIN_MODE=${GIN_MODE}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - FRONTEND_URL=${FRONTEND_URL}
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  default:
    external: true
    name: shared-network
